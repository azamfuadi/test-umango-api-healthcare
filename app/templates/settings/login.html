<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" /> <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='css/bootstrap.css') }}"/>
    <link href="{{ url_for('static',filename='css/responsive.css') }}" rel="stylesheet" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:weight@100;200;300;400;500;600;700;800&display=swap");

        body {
            background-image: linear-gradient(rgba(255, 0, 0, 0), rgba(138, 255, 185, 0.8));
            ;
            font-family: "Poppins", sans-serif;
            font-weight: 300
        }

        .container {
            height: 75vh
        }
    </style>
</head>

<body class="sub_page">
  <div class="hero_area">

    <header class="header_section">
        <div class=" mr-5 ml-5">
        <nav class="navbar navbar-expand-lg custom_nav-container pt-3">
            <div class="navbar-brand" >
                <img src="https://dka575ofm4ao0.cloudfront.net/pages-transactional_logos/retina/73329/PaperCut-Logotype-FA19-RGB_-_page.png"
                    alt="" width="105" height="30" class="d-inline-block align-text-top">
            </div>
          <div class="row" style="margin-left: auto;">

               <div class="dropdown">
              <button class="btn btn-secondary dropdown-toggle mr-1" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                {{ current_language|upper  }}    
              </button>
              <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                {% for code, name in languages.items() %}
                    <a href="{{ url_for('set_language', lang=code) }}" class="{% if code == current_language %} dropdown-item active {% else %} dropdown-item {% endif %}">
                      {{name}} 
                    </a>
                {% endfor %}
              </div>
            </div>
            
            <a href="{{papercut_server}}">
                <button class="btn btn-outline-success"><i class="fa fa-arrow-circle-left"></i> {{_('Back to PaperCut')}}</button>
            </a>
            </div>
            </nav>
        </div>
    </header>
    </div>
    
    <br>
    <br>
    
    <div class="container justify-content-center mt-5 mb-5">
        <div class="card">
            <div class="card-body ">
                <div class="row ">
                    <div class="col-12 mt-3 mb-3">
                    {% if message != '' %}
                    {% if "Success" in message or "成功" in message%}
                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                            {{message}}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close" onclick="removeUrlMessage('jp')">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    {% else %}
                    <div class="alert alert-danger alert alert-dismissible fade show" role="alert">
                        {{message}}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close" onclick="removeUrlMessage('jp')">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    {%endif%}
                    {%endif%}
                    <h2 class="custom_heading">
                        {{_('Paypay Configuration Login')}}
                    </h2>
                    <form action="/admin-login" method="post">
                        <input id="lang1" required name="lang" type="text" class="form-control" id="formGroupExampleInput"  value="jp" hidden>
                        <div class="mb-3">
                            <label for="formGroupExampleInput" class="form-label">{{_('Username')}}</label>
                            <input required name="username" type="text" class="form-control" id="formGroupExampleInput" placeholder="{{_('Please enter the correct username')}}" value="">
                        </div>
                        <div class="mb-3">
                            <label for="formGroupExampleInput" class="form-label">{{_('Password')}}</label>
                            <div class="input-group mb-3">
                                <input required name="password" id="ppc-token" class="form-control" type="password" placeholder="{{_('Please enter the correct password')}}"  value="" aria-describedby="button-addon2"/>
                                <button class="btn btn-secondary" type="button" id="button-addon2"id="preview-ppc-token" onclick="displayPaperCutToken()">{{_('Display')}}</button>
                            </div>
                        <div>
                        <div class="d-flex  mt-4 ">
                            <button class="btn btn-primary">
                            {{_('Login')}}
                            </button>
                        </div>
                    </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src= "{{ url_for('static',filename='js/jquery-3.4.1.min.js') }}"></script>
    <script src= "{{ url_for('static',filename='js/bootstrap.js') }}"></script>
    <script src= "{{ url_for('static',filename='js/circles.min.js') }}"></script>
    <script src= "{{ url_for('static',filename='js/custom.js') }}" ></script>
    <script src= "{{ url_for('static',filename='js/settingpage/settingpage.js') }}" ></script>
</body>


</html>
